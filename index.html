<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="5× World Champion. Онлайн тренировки и подготовка.">
    <title>Благов Александр | Профессиональный тренер</title>
    <style>
        /* ----- БАЗОВЫЕ СТИЛИ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(180deg, #0a0a0a, #1a1a1a, #0a0a0a);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 0;
            padding: 0;
        }

        /* ----- ЭКРАН ЗАГРУЗКИ (ПРЕЛОАДЕР) ----- */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.19, 1, 0.22, 1), visibility 0s linear 1.6s;
            opacity: 1;
            visibility: visible;
        }

        .preloader.hide {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-content {
            text-align: center;
            max-width: 85%;
            animation: fadeScaleIn 1.2s ease-out forwards;
        }

        /* Фото в прелоадере — акцент на портрет */
        .preloader-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 208, 0, 0.4), 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 32px;
            border: 2px solid rgba(255, 208, 0, 0.6);
            animation: softPulse 1.6s infinite alternate;
        }

        /* Глубокая фраза с анимацией появления и легким мерцанием */
        .deep-quote {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            line-height: 1.4;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: quoteReveal 1.2s 0.3s forwards, gentleGlow 2s 1.5s infinite;
        }

        .sub-quote {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s 0.8s forwards;
        }

        /* анимации прелоадера */
        @keyframes fadeScaleIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes quoteReveal {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes softPulse {
            0% {
                box-shadow: 0 0 10px rgba(255, 208, 0, 0.3), 0 0 0px rgba(255, 208, 0, 0.2);
                border-color: rgba(255, 208, 0, 0.5);
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 28px rgba(255, 208, 0, 0.8), 0 0 12px rgba(255, 200, 0, 0.5);
                border-color: rgba(255, 208, 0, 0.95);
                transform: scale(1.02);
            }
        }

        @keyframes gentleGlow {
            0% {
                text-shadow: 0 0 5px rgba(255, 208, 0, 0.3);
                opacity: 0.95;
            }
            100% {
                text-shadow: 0 0 15px rgba(255, 208, 0, 0.6);
                opacity: 1;
            }
        }

        /* ----- ОСНОВНОЙ КОНТЕНТ (появляется после прелоадера) ----- */
        .main-content {
            max-width: 460px;
            width: 100%;
            padding: 40px 20px;
            margin: 0 auto;
            position: relative;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* контент становится видимым */
        .main-content.visible {
            opacity: 1;
        }

        .section {
            margin-top: 30px;
            background: rgba(26, 26, 26, 0.8);
            padding: 20px;
            border-radius: 14px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 208, 0, 0.4);
            transition: transform 0.2s;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            opacity: 0.8;
            margin-top: 8px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .link {
            display: block;
            background: white;
            color: black;
            padding: 15px;
            margin-top: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .link:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
        }

        .primary {
            background: #ffd000;
            color: black;
        }

        /* Glow эффект для телеграм кнопки */
        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(255, 208, 0, 0.4);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 208, 0, 0.9);
            }
            100% {
                box-shadow: 0 0 5px rgba(255, 208, 0, 0.4);
            }
        }

        .glow {
            animation: glow 2s infinite;
        }

        .footer {
            margin-top: 40px;
            opacity: 0.5;
            font-size: 14px;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .main-content {
                padding: 20px 16px;
            }
            .deep-quote {
                font-size: 1.2rem;
            }
            .preloader-avatar {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>

<!-- ПРЕЛОАДЕР С ФОТО И ГЛУБОКОЙ ФРАЗОЙ -->
<div id="preloader" class="preloader">
    <div class="preloader-content">
        <!-- Ваше фото -->
        <img class="preloader-avatar" src="avatar.jpg" alt="Blagov Aleksandr loading">
        <div class="deep-quote">
            «Сила рождается там,<br> где разум встречает дисциплину»
        </div>
        <div class="sub-quote">
            — Blagov Aleksandr, 5× World Champion
        </div>
    </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ ГЛАВНОЙ СТРАНИЦЫ -->
<div class="main-content" id="mainContent">
    <div style="text-align: center;">
        <img class="avatar" src="avatar.jpg" alt="Blagov Aleksandr">
        <h1>Blagov Aleksandr</h1>
        <p class="subtitle">
            🏆 Персональный тренер<br>
            🏋️ Более 15 лет в фитнесе
        </p>

        <p style="opacity:0.6;margin-bottom:15px;">
            ⬇️ Выберите вариант
        </p>

        <a class="link" href="online.html">
            🔥 Онлайн тренировки
        </a>

        <a class="link primary glow" href="https://t.me/blagovfit" target="_blank">
            💬 Написать в Telegram
        </a>

        <a class="link" href="https://instagram.com/blagov.fit" target="_blank">
            📸 Instagram
        </a>

        <a class="link" href="gym.html">
            🏋️ Тренировки в зале
        </a>

        <div class="footer">
            Профессиональный тренер
        </div>
    </div>
</div>

<script>
    (function() {
        // Ждём полной загрузки DOM и всех медиа
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            const mainContent = document.getElementById('mainContent');
            
            // УВЕЛИЧЕННАЯ длительность показа прелоадера: 3.5 секунды
            // Этого достаточно, чтобы спокойно прочитать фразу и насладиться атмосферой
            const DISPLAY_DURATION = 3500; // 3.5 секунды
            
            function hidePreloader() {
                // Добавляем класс для плавного исчезновения
                preloader.classList.add('hide');
                // После начала анимации делаем основной контент видимым
                setTimeout(() => {
                    mainContent.classList.add('visible');
                }, 200);
                // Полностью удаляем прелоадер из DOM после завершения анимации
                setTimeout(() => {
                    if (preloader && preloader.parentNode) {
                        preloader.style.display = 'none';
                    }
                }, 800);
            }
            
            // Убедимся, что main-контент изначально скрыт
            mainContent.classList.remove('visible');
            
            // Запускаем скрытие прелоадера через указанное время
            setTimeout(() => {
                hidePreloader();
            }, DISPLAY_DURATION);
        });
        
        // Fallback на случай, если что-то пойдёт не так
        // Максимальное время показа 5 секунд (для безопасности)
        setTimeout(function() {
            const preloaderStill = document.getElementById('preloader');
            const mainBlock = document.getElementById('mainContent');
            if (preloaderStill && preloaderStill.style.display !== 'none' && !preloaderStill.classList.contains('hide')) {
                preloaderStill.classList.add('hide');
                setTimeout(() => {
                    if (mainBlock) mainBlock.classList.add('visible');
                    if (preloaderStill) preloaderStill.style.display = 'none';
                }, 300);
            }
        }, 5000);
    })();
</script>
</body>
</html>
