<style>

html, body{

}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0a0a0a,#1a1a1a,#0a0a0a);
color:white;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
}

.container{
max-width:460px;
width:100%;
padding:40px 20px;
animation:fade 0.8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.section{
margin-top:30px;
background:rgba(26,26,26,0.8);
padding:20px;
border-radius:14px;
backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
}

h1{
margin:0;
font-size:28px;
}

.subtitle{
opacity:0.8;
margin-top:8px;
margin-bottom:30px;
line-height:1.5;
}

.link{
display:block;
background:white;
color:black;
padding:15px;
margin-top:16px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:all 0.25s ease;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.link:hover{
transform:translateY(-3px);
box-shadow:0 14px 30px rgba(0,0,0,0.35);
}

.primary{
background:#ffd000;
color:black;
}

/* Glow эффект */

@keyframes glow{
0%{
box-shadow:0 0 5px rgba(255,208,0,0.4);
}
50%{
box-shadow:0 0 20px rgba(255,208,0,0.9);
}
100%{
box-shadow:0 0 5px rgba(255,208,0,0.4);
}
}

.glow{
animation:glow 2s infinite;
}

.footer{
margin-top:40px;
opacity:0.5;
font-size:14px;
}

</style>

</head>
